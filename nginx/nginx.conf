events {
    worker_connections 1024;
}

http {

    # ── Balanceo de carga entre los dos servidores web ────
    upstream transmilenio_backend {
        # Round robin — distribuye peticiones alternadamente
        server 10.0.10.10:80 weight=1;
        server 10.0.10.11:80 weight=1 backup;

        # Health check — si un servidor falla lo saca automáticamente
        keepalive 32;
    }

    server {
        listen 80;
        server_name transmilenio.local;

        # Logs
        access_log /var/log/nginx/access.log;
        error_log  /var/log/nginx/error.log;

        location / {
            proxy_pass http://transmilenio_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Si el servidor falla, intenta el siguiente
            proxy_next_upstream error timeout invalid_header http_500;
            proxy_connect_timeout 5s;
            proxy_read_timeout 10s;

            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ =404;
        }

        # Página de estado de Nginx
        location /nginx_status {
            stub_status on;
            allow 10.0.0.0/8;
            deny all;
        }
    }
}
